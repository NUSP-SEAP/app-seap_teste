<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <script>/* auto-reload: se a página veio do cache local, recarrega do servidor */
  !function(){try{var n=performance.getEntriesByType("navigation")[0];if(n&&0===n.transferSize&&"navigate"===n.type)location.reload()}catch(e){}}()</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Novo Administrador — Administração</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="/css/app/admin/novo_admin.css">
    <link rel="stylesheet" href="/css/app/body.css">
</head>

<body>

    <main>
        <div class="card">
            <h1>Novo Administrador</h1>
            <p class="muted">Os campos marcados com <strong>*</strong> são obrigatórios.</p>

            <form id="form-novo-admin" novalidate autocomplete="off">
                <div class="grid grid-2">
                    <div>
                        <label for="nome_completo" class="required">Nome completo</label>
                        <input type="text" id="nome_completo" name="nome_completo" required />
                    </div>
                    <div>
                        <label for="email" class="required">E-mail institucional</label>
                        <input type="email" id="email" name="email" required />
                    </div>
                </div>

                <div class="grid" style="margin-top: 12px;">
                    <div>
                        <label for="username" class="required">Nome de usuário</label>
                        <input type="text" id="username" name="username" required autocomplete="new-username" />
                    </div>
                </div>

                <div class="grid grid-2" style="margin-top: 12px;">
                    <div>
                        <label for="senha" class="required">Senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="senha" name="senha" required autocomplete="new-password" />
                            <button type="button" class="toggle-password" aria-label="Mostrar senha" tabindex="-1">
                                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                    </div>
                    <div>
                        <label for="confirmar_senha" class="required">Confirme a senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmar_senha" name="confirmar_senha" required
                                autocomplete="new-password" />
                            <button type="button" class="toggle-password" aria-label="Mostrar senha" tabindex="-1">
                                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <p id="status-message" class="muted status-message" aria-live="polite"></p>

                <div class="actions">
                    <button type="button" class="btn btn-secondary" id="btn-voltar">Voltar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </main>

    <script src="/js/config.js"></script>
    <script src="/js/session-autoload.js" defer></script>
    <script src="/js/app/admin/novo_admin.js" defer></script>
    <script>
      document.querySelectorAll('.toggle-password').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var input = this.parentElement.querySelector('input');
          var isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          this.querySelector('.eye-open').style.display = isPassword ? 'none' : '';
          this.querySelector('.eye-closed').style.display = isPassword ? '' : 'none';
          this.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
        });
      });
    </script>
</body>

</html>
