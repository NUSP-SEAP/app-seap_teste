<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <script>/* auto-reload: se a página veio do cache local, recarrega do servidor */
  !function(){try{var n=performance.getEntriesByType("navigation")[0];if(n&&0===n.transferSize&&"navigate"===n.type)location.reload()}catch(e){}}()</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Detalhe da Anormalidade | Admin</title>
    <link rel="stylesheet" href="/css/app/admin/form_anormalidade.css">
    <link rel="stylesheet" href="/css/app/body.css">
</head>

<body>
    <main>
        <div class="card">
            <span class="read-only-badge">Apenas Leitura</span>
            <h1>Detalhe da Anormalidade</h1>
            <p class="subtitle">
                Visualização administrativa do registro nº <span id="display-id">--</span>.
            </p>

            <form id="form-raoa-readonly">
                <!-- 1) Dados do Evento -->
                <div class="section-title">1) Dados do Evento</div>
                <div class="grid grid-3">
                    <div>
                        <label>Data</label>
                        <input type="text" id="data" readonly />
                    </div>
                    <div>
                        <label>Local do evento</label>
                        <input type="text" id="sala_nome" readonly />
                    </div>
                    <div>
                        <label>Nome do evento</label>
                        <input type="text" id="nome_evento" readonly />
                    </div>
                </div>

                <!-- 2) Responsáveis -->
                <div class="section-title" style="margin-top: 16px;">2) Responsáveis</div>
                <div>
                    <label for="responsavel_evento">Nome do Secretário da Comissão, da Mesa ou do responsável pelo evento</label>
                    <input type="text" id="responsavel_evento" readonly />
                </div>

                <!-- 3) Detalhes da Anormalidade -->
                <div class="section-title" style="margin-top: 20px;">3) Detalhes da Anormalidade</div>
                <div>
                    <label>Horário do início da anormalidade</label>
                    <input type="time" id="hora_inicio_anormalidade" readonly style="max-width: 150px;" />
                </div>

                <div style="margin-top: 12px;">
                    <label>Descrição da anormalidade</label>
                    <textarea id="descricao_anormalidade" readonly></textarea>
                </div>

                <!-- <div class="section-title">3) Solução</div>
                <div class="grid grid-2">
                    <div>
                        <label>Foi solucionada?</label>
                        <input type="text" id="foi_solucionada" readonly />
                    </div>
                    <div id="grp_solucao" class="hidden">
                        <label>Data/Hora Solução</label>
                        <input type="text" id="data_hora_solucao" readonly />
                    </div>
                </div> -->

                <!-- <div class="section-title">4) Impactos e Procedimentos</div> -->

                <div class="field-group">
                    <label>Houve suspensão, adiamento ou cancelamento do evento?</label>
                    <input type="text" id="houve_prejuizo" readonly />
                    <div id="grp_prejuizo" class="hidden" style="margin-top: 5px;">
                        <textarea id="descricao_prejuizo" readonly></textarea>
                    </div>
                </div>

                <div class="field-group" style="margin-top: 10px;">
                    <label>Houve reclamação?</label>
                    <input type="text" id="houve_reclamacao" readonly />
                    <div id="grp_reclamacao" class="hidden" style="margin-top: 5px;">
                        <textarea id="autores_conteudo_reclamacao" readonly></textarea>
                    </div>
                </div>

                <div class="field-group" style="margin-top: 10px;">
                    <label>Foi necessário acionar a manutenção?</label>
                    <input type="text" id="acionou_manutencao" readonly />
                    <div id="grp_manutencao" class="hidden" style="margin-top: 5px;">
                        <label>Hora acionamento:</label>
                        <input type="time" id="hora_acionamento_manutencao" readonly style="max-width: 150px;" />
                    </div>
                </div>

                <div class="field-group" style="margin-top: 10px;">
                    <label>A anormalidade foi resolvida pela própria operação?</label>
                    <input type="text" id="resolvida_pelo_operador" readonly />
                    <div id="grp_procedimentos" class="hidden" style="margin-top: 5px;">
                        <textarea id="procedimentos_adotados" readonly></textarea>
                    </div>
                </div>

                <div class="section-title">4) Responsáveis</div>
                <div class="grid grid-2">
                    <div>
                        <label>Registrado por (Operador)</label>
                        <input type="text" id="registrado_por" readonly />
                    </div>
                </div>
                <!-- Observações administrativas -->
                <div class="admin-observacao-bloco" id="bloco-observacao-supervisor">
                    <label for="observacao_supervisor">Observações do Supervisor</label>
                    <textarea id="observacao_supervisor"
                              class="admin-observacao-input"
                              readonly></textarea>
                    <div class="admin-observacao-actions"
                         id="acoes-observacao-supervisor"
                         style="display: none;">
                        <button type="button"
                                class="btn-primary"
                                id="btn-supervisor-salvar">
                            Salvar
                        </button>
                        <button type="button"
                                class="btn-secondary"
                                id="btn-supervisor-cancelar">
                            Cancelar
                        </button>
                    </div>
                </div>

                <div class="admin-observacao-bloco" id="bloco-observacao-chefe">
                    <label for="observacao_chefe">Observações do Chefe de Serviço</label>
                    <textarea id="observacao_chefe"
                              class="admin-observacao-input"
                              readonly></textarea>
                    <div class="admin-observacao-actions"
                         id="acoes-observacao-chefe"
                         style="display: none;">
                        <button type="button"
                                class="btn-primary"
                                id="btn-chefe-salvar">
                            Salvar
                        </button>
                        <button type="button"
                                class="btn-secondary"
                                id="btn-chefe-cancelar">
                            Cancelar
                        </button>
                    </div>
                </div>
                <div class="actions" style="justify-content: space-between; margin-top: 30px;">
                    <button type="button" class="btn-secondary" onclick="window.close()">Fechar Aba</button>
                    <button type="button" class="btn-primary" disabled title="Funcionalidade futura">Imprimir
                        🖨️</button>
                </div>
            </form>
        </div>
    </main>

    <script src="/js/config.js"></script>
    <script src="/js/auth_jwt.js"></script>
    <script src="/js/session-autoload.js"></script>
    <script src="/js/app/admin/form_anormalidade.js" defer></script>
</body>

</html>
